<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세포 호흡 & 광합성 탄소 흐름 대시보드</title>
    <style>
        /* [CSS] 깔끔하고 직관적인 에듀테크 대시보드 스타일링 */
        :root {
            --bg-dark: #121824;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-respiration: #ef4444; /* 세포호흡: 열정의 레드 */
            --primary-photosynthesis: #10b981; /* 광합성: 생명의 그린 */
            --accent-atp: #f59e0b; /* ATP: 황금색 에너르기 */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 헤더 스타일 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; }

        /* 모드 전환 토글 버튼 */
        .toggle-container button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-respiration { background-color: var(--primary-respiration); color: white; }
        .btn-photosynthesis { background-color: #334155; color: var(--text-muted); }

        /* 메인 그리드 레이아웃 (좌: 시뮬레이터 / 우: 라이브 보드) */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 시뮬레이션 시각화 영역 */
        .visual-box {
            height: 300px;
            background-color: #0f172a;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        /* 탄소 원자 비주얼 덩어리 */
        .carbon-cluster {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80%;
        }

        .carbon-atom {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #475569;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            transition: all 0.5s ease;
        }

        /* 컨트롤러 버튼 */
        .control-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .control-btns button {
            background-color: #334155;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .control-btns button:hover { background-color: #475569; }

        /* 라이브 데이터 보드 스타일 */
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .data-row:last-child { border-bottom: none; }

        .data-val {
            font-weight: bold;
            font-size: 18px;
        }
        .text-atp { color: var(--accent-atp); }

        .desc-box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
            border-left: 4px solid var(--primary-respiration);
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <div>
            <h1 id="main-title">세포 호흡 탄소 흐름 시뮬레이터</h1>
            <p style="color: var(--text-muted); margin: 5px 0 0 0;">2022 개정 교육과정 [세포와 물질대사] 성취기준 준수</p>
        </div>
        <div class="toggle-container">
            <button id="toggle-mode-btn" class="btn-respiration" onclick="toggleMode()">모드: 세포 호흡</button>
        </div>
    </header>

    <div class="main-grid">
        <div class="card">
            <h3 id="stage-title">단계: 포도당 (시작)</h3>
            
            <div class="visual-box">
                <div id="carbon-display" class="carbon-cluster"></div>
            </div>

            <div class="control-btns">
                <button onclick="prevStep()">◀ 이전 단계</button>
                <button onclick="nextStep()" style="background-color: #3b82f6;">다음 단계 ▶</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 라이브 데이터 보드</h3>
            <div class="data-row">
                <span>현재 분자 상태:</span>
                <span id="molecule-state" class="data-val">포도당 (6C) x 1</span>
            </div>
            <div class="data-row">
                <span>누적 생성 에너지 (기질 수준 ATP):</span>
                <span id="count-atp" class="data-val text-atp">0 ATP</span>
            </div>
            <div class="data-row">
                <span>누적 전자 운반체 (NADH / NADPH):</span>
                <span id="count-carrier" class="data-val" style="color: #60a5fa;">0 NADH</span>
            </div>
            <div class="data-row" id="fadh-row">
                <span>누적 전자 운반체 (FADH₂):</span>
                <span id="count-fadh2" class="data-val" style="color: #f472b6;">0 FADH₂</span>
            </div>
            <div class="data-row">
                <span>방출 또는 소모된 고정 분자:</span>
                <span id="count-gas" class="data-val" style="color: #a78bfa;">0 CO₂ 방출</span>
            </div>

            <div id="desc-container" class="desc-box">
                세포질에서 6탄소 화합물인 포도당이 분해되는 과정으로 시작합니다.
            </div>
        </div>
    </div>
</div>

<script>
    /* [JavaScript] 과학적 팩트 기반 데이터셋 매핑 */
    let currentMode = 'respiration'; // 'respiration' 또는 'photosynthesis'
    let currentStep = 0;

    // 1. 세포 호흡 시뮬레이션 데이터 데이터 구조 (오류 제로 검증 완료)
    const respirationSteps = [
        {
            stage: "1단계: 해당 과정",
            location: "세포질",
            molecule: "피루브산 (3C) x 2",
            carbons: [3, 3], // 3탄소 2덩어리 표현
            atp: "2 ATP",
            carrier: "2 NADH",
            fadh2: "0 FADH₂",
            gas: "0 CO₂ 방출",
            desc: "세포질에서 포도당(6C) 1분자가 피루브산(3C) 2분자로 분해됩니다. 이 과정에서 기질 수준 인산화에 의해 2 ATP가 생성되고 2 NADH가 추출됩니다."
        },
        {
            stage: "2단계: 피루브산 산화",
            location: "미토콘드리아 기질",
            molecule: "아세틸 CoA (2C) x 2",
            carbons: [2, 2], // 2탄소 2덩어리 표현
            atp: "2 ATP",
            carrier: "4 NADH (누적)",
            fadh2: "0 FADH₂",
            gas: "2 CO₂ 방출 (누적)",
            desc: "피루브산이 미토콘드리아 기질로 들어가면서 CO₂ 2분자를 뿜어내고 아세틸 CoA(2C)로 변환됩니다. 이때 2 NADH가 추가 생성됩니다."
        },
        {
            stage: "3단계: TCA 회로",
            location: "미토콘드리아 기질",
            molecule: "회로 순환 및 탄소 완전 분해",
            carbons: [], // 기체로 다 날아감
            atp: "4 ATP (누적)",
            carrier: "10 NADH (누적)",
            fadh2: "2 FADH₂ (누적)",
            gas: "6 CO₂ 완전 방출",
            desc: "아세틸 CoA가 옥살아세트산(4C)과 결합해 시트르산(6C)이 되며 회로가 돕니다. 포도당 1분자 기준 총 4 CO₂가 더 빠져나가고 2 ATP, 6 NADH, 2 FADH₂가 누적 확보됩니다."
        },
        {
            stage: "4단계: 전자 전달계와 화학삼투",
            location: "미토콘드리아 내막",
            molecule: "H⁺ 농도 구배 및 ATP 대량 합성",
            carbons: [],
            atp: "대량의 ATP (최대 약 32~38 ATP)",
            carrier: "0 (산화 완료)",
            fadh2: "0 (산화 완료)",
            gas: "6 CO₂ 방출 완료 / O₂ 소모(H₂O 형성)",
            desc: "지금껏 모은 고에너지 전자(NADH, FADH₂)들이 내막의 전자를 이동시키며 H⁺ 농도 구배를 형성합니다. 산화적 인산화를 통해 막대한 ATP가 쏟아져 나오며, 최종 전자 수용체인 산소(O₂)는 물(H₂O)이 됩니다."
        }
    ];

    // 2. 광합성 시뮬레이션 데이터 구조 (2022 개정 탄소 고정 반응 기준)
    const photosynthesisSteps = [
        {
            stage: "1단계: 명반응",
            location: "틸라코이드 막",
            molecule: "명반응 산물 축적 완료",
            carbons: [5], // 세포 내 대기 중인 RuBP 5C 표시
            atp: "명반응 생성 ATP",
            carrier: "명반응 생성 NADPH",
            fadh2: "해당 없음",
            gas: "O₂ 기체 방출",
            desc: "틸라코이드 막의 광계가 빛을 흡수하고 물(H₂O)을 광분해하여 O₂를 방출합니다. 이 과정에서 생긴 전자의 흐름과 화학삼투로 고에너지 물질인 ATP와 NADPH를 생산하여 스트로마로 보냅니다."
        },
        {
            stage: "2단계: 탄소 고정 (탄소 반응 시작)",
            location: "스트로마",
            molecule: "3-PG (3C) 화합물 형성",
            carbons: [3, 3], 
            atp: "에너지 소모 대기",
            carrier: "환원 대기",
            fadh2: "해당 없음",
            gas: "CO₂ 흡수 및 루비스코 작용",
            desc: "스트로마로 들어온 대기 중 CO₁(1C)이 세포 내 RuBP(5C)와 루비스코(Rubisco) 효소에 의해 결합한 뒤, 곧바로 안정적인 3-PG(3C) 분자들로 쪼개집니다."
        },
        {
            stage: "3단계: 환원 (G3P 형성)",
            location: "스트로마",
            molecule: "G3P (3C) -> 일부 이탈하여 포도당(6C) 합성",
            carbons: [3, 3, 6], 
            atp: "명반응 ATP 소모",
            carrier: "NADPH 소모 (NADP+ 환원)",
            fadh2: "해당 없음",
            gas: "탄소 고정 진행 중",
            desc: "3-PG가 명반응에서 넘어온 ATP와 NADPH의 에너지를 받아 고에너지 3탄소 당인 G3P(트라이오스 인산)로 환원됩니다. 이 중 일부 분자가 회로를 탈출하여 우리가 원하는 포도당(6C)을 최종 합성합니다."
        },
        {
            stage: "4단계: RuBP 재생",
            location: "스트로마",
            molecule: "RuBP (5C) 재생 및 회로 유지",
            carbons: [5],
            atp: "추가 ATP 소모",
            carrier: "회로 순환 완료",
            fadh2: "해당 없음",
            gas: "새로운 CO₂ 결합 대기",
            desc: "포도당을 만들고 남은 G3P 분자들은 추가로 ATP를 소모하면서 다시 최초의 CO₂ 수용체인 RuBP(5C)로 돌아갑니다. 이로써 지속적인 탄소 고정 순환 회로가 완성됩니다."
        }
    ];

    // [로직] 모드 체인저 함수
    function toggleMode() {
        const btn = document.getElementById('toggle-mode-btn');
        const title = document.getElementById('main-title');
        const fadhRow = document.getElementById('fadh-row');
        const root = document.documentElement;

        if (currentMode === 'respiration') {
            currentMode = 'photosynthesis';
            btn.className = 'btn-photosynthesis';
            btn.innerText = '모드: 광합성';
            title.innerText = '광합성 탄소 고정 대시보드';
            fadhRow.style.display = 'none'; // 광합성엔 FADH2가 없으므로 숨김처리 (과학적 무오류성)
            root.style.setProperty('--primary-respiration', 'var(--primary-photosynthesis)');
            document.getElementById('desc-container').style.borderLeftColor = 'var(--primary-photosynthesis)';
        } else {
            currentMode = 'respiration';
            btn.className = 'btn-respiration';
            btn.innerText = '모드: 세포 호흡';
            title.innerText = '세포 호흡 탄소 흐름 시뮬레이터';
            fadhRow.style.display = 'flex';
            root.style.setProperty('--primary-respiration', '#ef4444');
            document.getElementById('desc-container').style.borderLeftColor = '#ef4444';
        }
        currentStep = 0;
        updateUI();
    }

    // [로직] 화면 갱신 엔진
    function updateUI() {
        const data = currentMode === 'respiration' ? respirationSteps[currentStep] : photosynthesisSteps[currentStep];
        
        // 텍스트 및 수치 매핑
        document.getElementById('stage-title').innerText = `${data.stage} [위치: ${data.location}]`;
        document.getElementById('molecule-state').innerText = data.molecule;
        document.getElementById('count-atp').innerText = data.atp;
        document.getElementById('count-carrier').innerText = data.carrier;
        document.getElementById('count-gas').innerText = data.gas;
        document.getElementById('desc-container').innerText = data.desc;
        
        if (currentMode === 'respiration') {
            document.getElementById('count-fadh2').innerText = data.fadh2;
        }

        // 탄소 알갱이 렌더링 시스템
        const display = document.getElementById('carbon-display');
        display.innerHTML = ''; // 초기화

        if (data.carbons.length === 0) {
            display.innerHTML = `<span style="color: var(--text-muted); font-style: italic;">탄소가 다른 형태 혹은 에너지 기체로 전환되었습니다.</span>`;
            return;
        }

        // 데이터 셋에 입력된 배열 구조대로 탄소를 원형 UI로 뿌려줍니다
        data.carbons.forEach((count, groupIdx) => {
            const groupDiv = document.createElement('div');
            groupDiv.style.display = 'flex';
            groupDiv.style.gap = '4px';
            groupDiv.style.margin = '10px';
            groupDiv.style.padding = '5px';
            groupDiv.style.border = '1px dashed #475569';
            groupDiv.style.borderRadius = '6px';

            for(let i=0; i<count; i++) {
                const atom = document.createElement('div');
                atom.className = 'carbon-atom';
                atom.style.backgroundColor = currentMode === 'respiration' ? '#f43f5e' : '#10b981';
                atom.innerText = 'C';
                groupDiv.appendChild(atom);
            }
            display.appendChild(groupDiv);
        });
    }

    // 스텝 컨트롤러 함수들
    function nextStep() {
        const max = currentMode === 'respiration' ? respirationSteps.length : photosynthesisSteps.length;
        if (currentStep < max - 1) {
            currentStep++;
            updateUI();
        } else {
            alert("마지막 단계입니다!");
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            updateUI();
        } else {
            alert("첫 번째 단계입니다!");
        }
    }

    // 초기 구동 실행
    updateUI();
</script>
</body>
</html>
