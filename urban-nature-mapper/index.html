<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어반 네이처 맵퍼 (Urban Nature Mapper)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
            color: #333;
        }

        /* 사이드바 스타일 */
        #sidebar {
            width: 400px;
            background-color: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .header {
            background-color: #2e7d32;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        /* 폼 스타일 */
        #observation-form {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        .form-group input[type="text"],
        .form-group textarea,
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: #2e7d32;
            outline: none;
        }

        .coordinate-box {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #ccc;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .coordinate-box span {
            font-weight: bold;
            color: #2e7d32;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1b5e20;
        }

        /* 지도 영역 스타일 */
        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 인포윈도우 스타일 */
        .infowindow-content {
            padding: 10px;
            width: 250px;
            font-size: 13px;
        }

        .infowindow-content img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .infowindow-title {
            font-weight: bold;
            font-size: 15px;
            color: #2e7d32;
            margin-bottom: 4px;
        }

        .infowindow-meta {
            font-size: 11px;
            color: #777;
            margin-bottom: 6px;
        }
    </style>

    <!-- Firebase SDK (Compat 버전으로 초보자도 쓰기 쉽게 구성) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <!-- 카카오맵 API (YOUR_KAKAO_JS_KEY 부분을 실제 발급받은 자바스크립트 키로 교체해야 합니다) -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7b524f0e08bfd50ca987b189ec057695"></script>
</head>
<body>

    <!-- 왼쪽 사이드바: 입력 폼 -->
    <div id="sidebar">
        <div class="header">
            <h1>🌿 어반 네이처 맵퍼</h1>
            <p>우리 학교 주변의 도시 생태계를 기록해봐요!</p>
        </div>
        
        <form id="observation-form">
            <div class="form-group">
                <label for="student-info">학번 / 이름</label>
                <input type="text" id="student-info" placeholder="예: 10101 홍길동" required>
            </div>

            <div class="form-group">
                <label for="creature-name">발견한 생물 이름</label>
                <input type="text" id="creature-name" placeholder="예: 보도블록 틈새 질경이, 참새" required>
            </div>

            <div class="form-group">
                <label for="discovery-location">발견 장소 설명</label>
                <input type="text" id="discovery-location" placeholder="예: 본관 뒤편 주차장 화단 옆" required>
            </div>

            <div class="form-group">
                <label for="observation-details">관찰 내용 및 생태적 특징</label>
                <textarea id="observation-details" rows="4" placeholder="예: 콘크리트 틈새에 뿌리를 내림. 척박한 환경에 적응한 생산자 역할을 하고 있음." required></textarea>
            </div>

            <div class="form-group">
                <label for="photo-upload">생물 사진 올리기</label>
                <input type="file" id="photo-upload" accept="image/*" required>
            </div>

            <!-- 지도 클릭 시 자동으로 위도, 경도가 찍히는 안내창 -->
            <div class="coordinate-box">
                📍 선택된 위치<br>
                위도: <span id="display-lat">지도에서 위치를 클릭하세요</span><br>
                경도: <span id="display-lng">지도에서 위치를 클릭하세요</span>
            </div>

            <!-- 실제 전송할 숨겨진 input -->
            <input type="hidden" id="lat">
            <input type="hidden" id="lng">

            <button type="submit" id="submit-btn">생태 지도에 등록하기 🚀</button>
        </form>
    </div>

    <!-- 오른쪽 영역: 지도 -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- 로직 스크립트 연결 -->
    <script src="app.js"></script>
</body>
</html>
